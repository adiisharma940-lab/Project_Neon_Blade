<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07070f">
<title>Legendary Classics — 3D Showcase</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:#07070f;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

#canvas-container{position:fixed;top:0;left:0;width:100%;height:100vh;z-index:1;}
canvas{display:block;width:100%!important;height:100%!important;touch-action:none;}

/* Each car chapter is 700vh */
.scroll-space{position:relative;z-index:2;pointer-events:none;}

/* Progress bar */
#progress{position:fixed;top:0;left:0;height:2px;z-index:20;width:0;transition:width 0.12s;
  background:linear-gradient(90deg,var(--accent),var(--accent-bright));}

/* Car nav dots */
#car-nav{
  position:fixed;right:max(18px,env(safe-area-inset-right,18px));top:50%;
  transform:translateY(-50%);z-index:15;
  display:flex;flex-direction:column;gap:12px;
}
.nav-dot{
  width:6px;height:6px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.3);
  background:transparent;cursor:pointer;pointer-events:all;
  transition:all 0.3s;
}
.nav-dot.active{background:var(--accent);border-color:var(--accent);transform:scale(1.4);}
@media(max-width:599px){#car-nav{right:10px;}}

/* Logo */
.logo{position:fixed;top:max(20px,env(safe-area-inset-top,20px));left:max(20px,env(safe-area-inset-left,20px));z-index:10;}
.logo-name{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.9);font-weight:300;transition:color 0.6s;}
.logo-year{font-size:9px;letter-spacing:3px;color:var(--accent);margin-top:3px;transition:color 0.6s;}

/* Chapter label — top center */
#chapter-label{
  position:fixed;top:max(22px,env(safe-area-inset-top,22px));left:50%;transform:translateX(-50%);
  z-index:10;text-align:center;pointer-events:none;
  transition:opacity 0.5s;
}
#chapter-label .cl-num{font-size:9px;letter-spacing:4px;color:rgba(255,255,255,0.25);text-transform:uppercase;}
#chapter-label .cl-name{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-top:2px;}
@media(max-width:599px){#chapter-label{display:none;}}

/* Hero */
.hero{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:5;pointer-events:none;width:90%;
  transition:opacity 0.6s ease,transform 0.6s ease;
}
.hero.hidden{opacity:0;transform:translate(-50%,-56%);pointer-events:none;}
.hero-eyebrow{font-size:9px;letter-spacing:6px;text-transform:uppercase;color:var(--accent);margin-bottom:16px;transition:color 0.6s;}
.hero-title{font-size:clamp(2.6rem,12vw,6rem);font-weight:900;line-height:1;letter-spacing:-2px;}
.hero-title em{font-style:normal;color:var(--accent);transition:color 0.6s;}
