<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON BLADES — Legendary Swords</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&family=Noto+Serif+JP:wght@300;400&display=swap');

:root{
  --bg:#04050a;
  --text:#e0e8f0;
  --dim:#3a4455;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  overflow-x:hidden;
}

/* ── BG CANVAS ── */
#bgc{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  z-index:0;pointer-events:none;
}

/* ── HERO ── */
#hero{
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;z-index:2;
}
.hero-title{
  font-family:'Orbitron',monospace;
  font-size:clamp(28px,5.5vw,80px);
  font-weight:900;letter-spacing:12px;
  text-align:center;line-height:1.1;
  background:linear-gradient(135deg,#ff00ff,#ff6ec7,#ff00aa,#ff4444,#ff8800);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 30px rgba(255,0,200,0.5));
}
.hero-sub{
  font-family:'Orbitron',monospace;
  font-size:clamp(8px,1.1vw,12px);
  letter-spacing:6px;color:var(--dim);
  margin-top:16px;text-transform:uppercase;
}
.hero-line{
  width:120px;height:1px;margin:22px auto;
  background:linear-gradient(90deg,transparent,#ff00cc,transparent);
}
.scroll-hint{
  position:absolute;bottom:34px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:8px;letter-spacing:4px;
  color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:bob 2s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}

/* ── SWORD SECTION ── */
.sword-section{
  min-height:160vh;
  display:flex;align-items:stretch;
  position:relative;z-index:2;
  overflow:hidden;
}

/* LEFT half — sword stage */
.sword-stage{
  width:55%;min-height:160vh;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
}

/* scabbard */
.scabbard-el{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  will-change:transform,opacity;
  pointer-events:none;
  width:min(400px, 88%);
  height:auto;
  display:block;
}

/* sword */
.sword-canvas-wrap{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  will-change:transform,filter;
  transform-origin:center center;
  width:min(400px, 88%);
  height:auto;
  display:block;
}

/* RIGHT — info */
.sword-info{
  width:45%;
  min-height:160vh;
  padding:clamp(30px,5vw,80px) clamp(14px,3.5vw,70px) clamp(30px,5vw,80px) clamp(10px,2vw,30px);
  display:flex;flex-direction:column;justify-content:center;
  background:linear-gradient(90deg,rgba(4,5,10,0) 0%,rgba(4,5,10,0.65) 18%,rgba(4,5,10,0.8) 55%,rgba(4,5,10,0.65) 100%);
  position:relative;z-index:3;
}

/* ── MOBILE: stack vertically ── */
@media(max-width:680px){
  .sword-section{
    flex-direction:column;
    min-height:auto;
  }
  .sword-stage{
    width:100%;
    min-height:42vw;
    height:42vw;
    flex-shrink:0;
  }
  .scabbard-el,
  .sword-canvas-wrap{
    width:min(360px,90vw);
    height:auto;
  }
  .sword-info{
    width:100%;
    min-height:auto;
    padding:28px 22px 44px;
    background:linear-gradient(to bottom,rgba(4,5,10,0.6) 0%,rgba(4,5,10,0.85) 40%,rgba(4,5,10,0.7) 100%);
  }
}

.sword-num{
  font-family:'Orbitron',monospace;font-size:9px;
  letter-spacing:5px;margin-bottom:10px;
  opacity:0;transform:translateX(28px);
  transition:opacity .6s ease .05s,transform .6s ease .05s;
}
.sword-name{
  font-family:'Orbitron',monospace;
  font-size:clamp(20px,2.8vw,40px);
  font-weight:900;letter-spacing:3px;
  line-height:1.1;margin-bottom:6px;
  opacity:0;transform:translateX(32px);
  transition:opacity .7s ease .15s,transform .7s ease .15s;
}
.sword-jp{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(13px,1.5vw,20px);
  font-weight:300;margin-bottom:20px;
  opacity:0;transform:translateX(28px);
  transition:opacity .6s ease .22s,transform .6s ease .22s;
}
.sword-divider{
  height:2px;width:48px;margin-bottom:20px;
  opacity:0;transform:scaleX(0);transform-origin:left;
  transition:opacity .5s ease .3s,transform .5s ease .3s;
}
.sword-desc{
  font-size:clamp(13px,1.3vw,16px);line-height:1.9;
  color:rgba(224,232,240,0.68);font-weight:300;
  max-width:460px;margin-bottom:22px;
  opacity:0;transform:translateX(22px);
  transition:opacity .7s ease .38s,transform .7s ease .38s;
}
.sword-lore{
  font-style:italic;font-size:clamp(11px,1vw,13px);
  line-height:1.85;padding-left:14px;border-left:2px solid;
  max-width:400px;margin-bottom:24px;
  opacity:0;transform:translateX(18px);
  transition:opacity .7s ease .48s,transform .7s ease .48s;
}
.sword-tags{
  display:flex;gap:10px;flex-wrap:wrap;
  opacity:0;transform:translateX(14px);
  transition:opacity .6s ease .58s,transform .6s ease .58s;
}
.sword-tag{
  font-family:'Orbitron',monospace;font-size:8px;
  letter-spacing:2px;padding:5px 12px;
  border:1px solid;border-radius:2px;
  background:rgba(255,255,255,0.03);
}

.sword-section.vis .sword-num,
.sword-section.vis .sword-name,
.sword-section.vis .sword-jp,
.sword-section.vis .sword-desc,
.sword-section.vis .sword-lore,
.sword-section.vis .sword-tags{opacity:1;transform:translateX(0)}
.sword-section.vis .sword-divider{opacity:1;transform:scaleX(1)}

/* separator */
.sep{
  height:1px;z-index:2;position:relative;
  background:linear-gradient(90deg,transparent,rgba(255,0,200,0.12) 30%,rgba(255,0,200,0.25) 50%,rgba(255,0,200,0.12) 70%,transparent);
}

footer{
  text-align:center;padding:60px 20px;
  font-family:'Orbitron',monospace;font-size:8px;
  letter-spacing:4px;color:var(--dim);
  position:relative;z-index:2;
}
</style>
</head>

// DRAW SWORD
// ═══════════════════════════════════════════════════════════
function drawSwordCanvas(sw){
  const W=400, H=80;
  const c=document.createElement('canvas');
  c.width=W; c.height=H;
  const x=c.getContext('2d');
  const {c1,c2,c3,gripColor,guardColor,bladeStyle,id}=sw;

  let bladePath = new Path2D();
  let spinePath = new Path2D();
  let edgePath  = new Path2D();
  let GX = 265;

  const T = 14;
  const SY = 28;
  const EY = 52;
  const TY = 38;

  if(id==='excalibur'){
    GX=268;
    bladePath.moveTo(T, TY);
    bladePath.lineTo(T+12, SY+1);
    bladePath.lineTo(GX,   SY);
    bladePath.lineTo(GX,   EY);
    bladePath.lineTo(T+8,  TY+3);
    bladePath.closePath();
    spinePath.moveTo(T+12,SY+1); spinePath.lineTo(GX,SY);
    edgePath.moveTo(T+8,TY+3);   edgePath.lineTo(GX,EY);
  } else if(id==='kusanagi'){
    GX=272;
    bladePath.moveTo(T, TY);
    bladePath.lineTo(T+18, SY+2);
    bladePath.lineTo(GX,   SY+1);
    bladePath.lineTo(GX,   EY);
    bladePath.bezierCurveTo(GX-60,EY+2, T+60,TY+5, T, TY);
    bladePath.closePath();
    spinePath.moveTo(T+18,SY+2); spinePath.lineTo(GX,SY+1);
    edgePath.moveTo(T,TY); edgePath.bezierCurveTo(T+60,TY+5,GX-60,EY+2,GX,EY);
  } else if(id==='gram'){
    GX=262;
    bladePath.moveTo(T, TY);
    bladePath.lineTo(T+10, SY);
    bladePath.lineTo(GX-10, SY-2);
    bladePath.lineTo(GX,    SY);
    bladePath.lineTo(GX,    EY+2);
    bladePath.lineTo(GX-10, EY+4);
    bladePath.lineTo(T+8,   TY+4);
    bladePath.closePath();
    spinePath.moveTo(T+10,SY); spinePath.lineTo(GX-10,SY-2); spinePath.lineTo(GX,SY);
    edgePath.moveTo(T+8,TY+4); edgePath.lineTo(GX-10,EY+4); edgePath.lineTo(GX,EY+2);
  } else if(id==='tyrfing'){
    GX=260;
    bladePath.moveTo(T, TY);
    bladePath.lineTo(T+14, SY+1);
    bladePath.lineTo(GX,   SY);
    bladePath.lineTo(GX,   EY);
    bladePath.lineTo(GX-20, EY+3);
    bladePath.lineTo(GX-30, TY+5);
    bladePath.lineTo(GX-50, EY+4);
    bladePath.lineTo(GX-70, TY+4);
    bladePath.lineTo(GX-100,EY+3);
    bladePath.lineTo(GX-130,TY+3);
    bladePath.lineTo(T+14,  TY+3);
    bladePath.lineTo(T,     TY);
    bladePath.closePath();
    spinePath.moveTo(T+14,SY+1); spinePath.lineTo(GX,SY);
    edgePath.moveTo(GX,EY); edgePath.lineTo(GX-20,EY+3); edgePath.lineTo(GX-30,TY+5);
    edgePath.lineTo(GX-50,EY+4); edgePath.lineTo(GX-70,TY+4); edgePath.lineTo(GX-100,EY+3);
    edgePath.lineTo(GX-130,TY+3); edgePath.lineTo(T+14,TY+3);
  } else if(id==='durandal'){
    GX=270;
    bladePath.moveTo(T, TY);
    bladePath.lineTo(T+16, SY);
    bladePath.lineTo(GX,   SY-1);
    bladePath.lineTo(GX,   EY+1);
    bladePath.lineTo(T+12, TY+5);
    bladePath.closePath();

function drawScabbardCanvas(sw){
  const W=400,H=80;
  const c=document.createElement('canvas');
  c.width=W;c.height=H;
  const x=c.getContext('2d');
  const {c1,c3,guardColor}=sw;
  const CY=H/2;
  const TIP=14, GX=265;

  const sg=x.createLinearGradient(0,CY-16,0,CY+16);
  sg.addColorStop(0,  '#0a0c18');
  sg.addColorStop(0.3,'#14172a');
  sg.addColorStop(0.5,'#1c2035');
  sg.addColorStop(0.7,'#14172a');
  sg.addColorStop(1,  '#0a0c18');
  x.fillStyle=sg;
  x.beginPath();
  x.moveTo(TIP,   CY);
  x.lineTo(TIP+14,CY-12);
  x.lineTo(GX+8,  CY-14);
  x.lineTo(GX+8,  CY+14);
  x.lineTo(TIP+14,CY+12);
  x.closePath();
  x.fill();

  x.save();
  x.shadowColor=c1; x.shadowBlur=5;
  const seam=x.createLinearGradient(TIP,0,GX,0);
  seam.addColorStop(0,'transparent'); seam.addColorStop(0.1,c1+'44');
  seam.addColorStop(0.5,c1+'88'); seam.addColorStop(0.9,c1+'44'); seam.addColorStop(1,'transparent');
  x.strokeStyle=seam; x.lineWidth=0.8;
  x.beginPath(); x.moveTo(TIP+14,CY-12); x.lineTo(GX+8,CY-14); x.stroke();
  x.beginPath(); x.moveTo(TIP+14,CY+12); x.lineTo(GX+8,CY+14); x.stroke();
  x.restore();

  [GX-55,GX-130,GX-205].forEach(bx=>{
    x.fillStyle=c1+'1a'; x.fillRect(bx,CY-13,16,26);
    x.strokeStyle=c1+'33'; x.lineWidth=0.6; x.strokeRect(bx,CY-13,16,26);
  });

  x.save();
  x.shadowColor=guardColor; x.shadowBlur=10;
  x.strokeStyle=guardColor; x.lineWidth=2.5;
  x.beginPath(); x.moveTo(GX+8,CY-14); x.lineTo(GX+8,CY+14); x.stroke();
  x.restore();

  return c;
}

function lighten(hex,a){
  try{
    const n=parseInt(hex.replace(/[^0-9a-f]/gi,'').slice(0,6),16);
    return`#${[n>>16,n>>8&255,n&255].map(v=>Math.min(255,v+a).toString(16).padStart(2,'0')).join('')}`;
  }catch{return hex;}
}
function darken(hex,a){
  try{
    const n=parseInt(hex.replace(/[^0-9a-f]/gi,'').slice(0,6),16);
    return`#${[n>>16,n>>8&255,n&255].map(v=>Math.max(0,v-a).toString(16).padStart(2,'0')).join('')}`;
  }catch{return hex;}
}

  info.innerHTML=`
    <div class="sword-num" style="color:${sw.c1}">${String(idx+1).padStart(2,'0')} / 20 · ${sw.myth}</div>
    <div class="sword-name" style="color:${sw.c1};text-shadow:0 0 30px ${sw.c1}88,0 0 60px ${sw.c1}44">${sw.name}</div>
    <div class="sword-jp" style="color:${sw.c1}88">${sw.jp}</div>
    <div class="sword-divider" style="background:linear-gradient(90deg,${sw.c1},${sw.c2},transparent)"></div>
    <p class="sword-desc">${sw.desc}</p>
    <p class="sword-lore" style="border-color:${sw.c1}44;color:${sw.c1}77">${sw.lore}</p>
    <div class="sword-tags">
      ${sw.tags.map(t=>`<span class="sword-tag" style="border-color:${sw.c1}44;color:${sw.c1}">${t}</span>`).join('')}
    </div>`;
  sec.appendChild(info);
  root.appendChild(sec);

  if(idx<SWORDS.length-1){
    const sep=document.createElement('div');
    sep.className='sep';
    root.appendChild(sep);
  }

  return{sw,sec,swordEl:swordCvs,scabbardEl:scabbardCvs,stage,lastP:-1};
});

// ═══════════════════════════════════════════════════════════
// SCROLL ANIMATION — REVERSED DIRECTION + FASTER SPEED
//
// CHANGES vs original:
//   • Sword + scabbard now enter from the LEFT (negative OFF)
//   • Scabbard peels away to the RIGHT (+OFF) — opposite of before
//   • Sword exits to the RIGHT (+OFF) after unsheathing
//   • All phase windows compressed for faster transitions:
//       slide-in:      0.05 → 0.22  (was 0.08 → 0.32)
//       scabbard-peel: 0.22 → 0.42  (was 0.32 → 0.58)
//       rotation:      0.42 → 0.58  (was 0.58 → 0.76)
//       exit:          0.58 → 0.82  (was 0.76 → 0.97)
// ═══════════════════════════════════════════════════════════

function eio(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function lerp(a,b,t){return a+(b-a)*t;}

function getOFF(stage){
  return (stage.offsetWidth||window.innerWidth) * 0.75 + 220;
}

function updateSection(d,p){
  const {swordEl,scabbardEl,sw,stage}=d;
  const OFF = getOFF(stage);

  // ── SWORD translateX — enters from LEFT (-OFF), exits to RIGHT (+OFF) ──
  let sTX = -OFF;
  if(p < 0.05){
    sTX = -OFF;
  } else if(p < 0.22){
    sTX = lerp(-OFF, 0, eio((p-0.05)/0.17));
  } else if(p < 0.58){
    sTX = 0;
  } else if(p < 0.82){
    sTX = lerp(0, OFF, eio((p-0.58)/0.24));
  } else {
    sTX = OFF;
  }

  // ── SWORD rotation ──
  let sRot = 0;
  if(p >= 0.42 && p < 0.58){
    sRot = lerp(0, -90, eio((p-0.42)/0.16));
  } else if(p >= 0.58){
    sRot = -90;
  }

  // ── SCABBARD — enters from LEFT (-OFF), peels away to RIGHT (+OFF) ──
  let cTX = -OFF;
  let cOp = 1;
  if(p < 0.05){
    cTX = -OFF; cOp = 1;
  } else if(p < 0.22){
    cTX = lerp(-OFF, 0, eio((p-0.05)/0.17));
    cOp = 1;
  } else if(p < 0.42){
    const t = eio((p-0.22)/0.20);
    cTX = lerp(0, OFF, t);
    cOp = lerp(1, 0, t);
  } else {
    cTX = OFF; cOp = 0;
  }

  // ── GLOW ──
  let glowMag = 0;
  if(p >= 0.22 && p < 0.42){
    glowMag = lerp(0, 1, eio((p-0.22)/0.20));
  } else if(p >= 0.42 && p < 0.50){
    glowMag = 1;
  } else if(p >= 0.50 && p < 0.75){
    glowMag = lerp(1, 0.2, eio((p-0.50)/0.25));
  } else if(p < 0.22){
    glowMag = 0;
  } else {
    glowMag = 0.15;
  }

  const c=sw.c1, c2=sw.c2;
  const g1=Math.round(6+glowMag*24);
  const g2=Math.round(12+glowMag*28);
  const g3=Math.round(0+glowMag*16);
  const filterStr=glowMag>0.05
    ?`drop-shadow(0 0 ${g1}px ${c}) drop-shadow(0 0 ${g2}px ${c}${Math.round(glowMag*180).toString(16).padStart(2,'0')}) drop-shadow(0 0 ${g3}px ${c2}${Math.round(glowMag*120).toString(16).padStart(2,'0')})`
    :'none';

  swordEl.style.transform    = `translate(calc(-50% + ${sTX}px), -50%) rotate(${sRot}deg)`;
  swordEl.style.filter       = filterStr;
  scabbardEl.style.transform = `translate(calc(-50% + ${cTX}px), -50%)`;
  scabbardEl.style.opacity   = cOp;
}

// Text reveal observer
const tobs=new IntersectionObserver(es=>{
  es.forEach(e=>e.target.classList.toggle('vis',e.isIntersecting));
},{threshold:0.2});
sectionData.forEach(d=>tobs.observe(d.sec));

function onScroll(){
  const vh=window.innerHeight;
  sectionData.forEach(d=>{
    const r=d.sec.getBoundingClientRect();
    const h=d.sec.offsetHeight;
    const p=clamp((vh-r.top)/(h+vh),0,1);
    if(Math.abs(p-d.lastP)>0.0006){d.lastP=p;updateSection(d,p);}
  });
}
sectionData.forEach(d=>updateSection(d,0));
window.addEventListener('scroll',onScroll,{passive:true});
window.addEventListener('resize',()=>{ setTimeout(onScroll,100); },{passive:true});
onScroll();

// ═══════════════════════════════════════════════════════════
// LIVE BACKGROUND
// ═══════════════════════════════════════════════════════════
(function(){
  const cv=document.getElementById('bgc');
  const cx=cv.getContext('2d');
  let W,H;

  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 680;

  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();

  const STAR_COUNT = isMobile ? 80 : 280;
  const STARS=[];
  for(let i=0;i<STAR_COUNT;i++){
    STARS.push({
      x:Math.random(),y:Math.random(),
      r:Math.random()*(isMobile?1:1.4)+0.2,
      a:Math.random()*0.7+0.1,
      twinkle:Math.random()*Math.PI*2,
      ts:0.008+Math.random()*0.015,
    });
  }

  const STREAKS=[];
  function spawnStreak(col){
    if(isMobile) return;
    STREAKS.push({
      x:Math.random()*W, y:Math.random()*H,
      len:60+Math.random()*200,
      ang:Math.PI*(-0.05+Math.random()*0.1),
      vx:-0.3-Math.random()*0.6,
      life:1,decay:0.004+Math.random()*0.006,
      col:col||'#ff00cc',
      w:0.5+Math.random()*1.2,
    });
  }

  const MOTE_COUNT = isMobile ? 15 : 50;
  const MOTES=[];
  for(let i=0;i<MOTE_COUNT;i++){
    MOTES.push({
      x:Math.random()*1,y:Math.random()*1,
      vx:(Math.random()-0.5)*0.0001,
      vy:-(0.00005+Math.random()*0.0001),
      r:0.8+Math.random()*2,
      a:0.15+Math.random()*0.35,
      life:Math.random(),
      col:'#ff00cc',
    });
  }

  const NW = isMobile ? 640 : 1920;
  const NH = isMobile ? 360 : 1080;
  const nebulaOc=document.createElement('canvas');
  nebulaOc.width=NW;nebulaOc.height=NH;
  const noc=nebulaOc.getContext('2d');
  const nebCols=[
    {x:0.15,y:0.3, r:isMobile?130:400,c:'rgba(120,0,180,0.025)'},
    {x:0.85,y:0.7, r:isMobile?110:350,c:'rgba(0,150,255,0.02)'},
    {x:0.5, y:0.5, r:isMobile?160:500,c:'rgba(180,0,120,0.018)'},
    {x:0.3, y:0.8, r:isMobile?100:300,c:'rgba(0,200,150,0.015)'},
    {x:0.7, y:0.2, r:isMobile?120:380,c:'rgba(255,100,0,0.015)'},
  ];
  nebCols.forEach(n=>{
    const g=noc.createRadialGradient(n.x*NW,n.y*NH,0,n.x*NW,n.y*NH,n.r);
    g.addColorStop(0,n.c);g.addColorStop(1,'transparent');
    noc.fillStyle=g;noc.fillRect(0,0,NW,NH);
  });

  let acR=255,acG=0,acB=200;
  let tR=255,tG=0,tB=200;

  function updateAccent(){
    let best=null,bv=-1;
    sectionData.forEach((d,i)=>{
      const r=d.sec.getBoundingClientRect();
      const vis=Math.min(r.bottom,H)-Math.max(r.top,0);
      if(vis>bv){bv=vis;best=i;}
    });
    if(best!==null){
      const sw=SWORDS[best];
      const hex=sw.c1.replace('#','').slice(0,6);
      tR=parseInt(hex.slice(0,2),16)||0;
      tG=parseInt(hex.slice(2,4),16)||0;
      tB=parseInt(hex.slice(4,6),16)||0;
    }
  }
  window.addEventListener('scroll',updateAccent,{passive:true});

  let scanPat=null;
  if(!isMobile){
    const slOc=document.createElement('canvas');
    slOc.width=4;slOc.height=4;
    const slc=slOc.getContext('2d');
    slc.fillStyle='rgba(0,0,0,0.06)';
    slc.fillRect(0,0,4,2);
    scanPat=cx.createPattern(slOc,'repeat');
  }

  let lastT=0;
  function frame(ts){
    const dt=Math.min(ts-lastT,50);lastT=ts;

    acR+=(tR-acR)*0.008;acG+=(tG-acG)*0.008;acB+=(tB-acB)*0.008;
    const ar=Math.round(acR),ag=Math.round(acG),ab=Math.round(acB);

    cx.clearRect(0,0,W,H);

    const bg=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.8);
    bg.addColorStop(0,   `rgba(${Math.round(ar*0.04)},${Math.round(ag*0.04)},${Math.round(ab*0.06+8)},1)`);
    bg.addColorStop(0.5, `rgba(${Math.round(ar*0.02)},${Math.round(ag*0.02)},${Math.round(ab*0.04+5)},1)`);
    bg.addColorStop(1,   'rgba(2,3,6,1)');
    cx.fillStyle=bg;cx.fillRect(0,0,W,H);

    cx.save();cx.globalAlpha=0.8;
    cx.drawImage(nebulaOc,0,0,W,H);
    cx.restore();

    const an=cx.createRadialGradient(W*0.5,H*0.5,0,W*0.5,H*0.5,W*0.55);
    an.addColorStop(0,`rgba(${ar},${ag},${ab},0.025)`);
    an.addColorStop(0.6,`rgba(${ar},${ag},${ab},0.008)`);
    an.addColorStop(1,'transparent');
    cx.fillStyle=an;cx.fillRect(0,0,W,H);

    STARS.forEach(s=>{
      s.twinkle+=s.ts*dt;
      const a=s.a*(0.6+0.4*Math.sin(s.twinkle));
      cx.fillStyle=`rgba(${180+Math.round(ar*0.3)},${180+Math.round(ag*0.2)},${200+Math.round(ab*0.2)},${a})`;
      cx.beginPath();cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);cx.fill();
    });

    if(!isMobile){
      cx.save();cx.globalAlpha=0.025;
      cx.strokeStyle=`rgba(${ar},${ag},${ab},1)`;cx.lineWidth=0.5;
      const gs=Math.round(H/20);
      for(let gy=0;gy<H;gy+=gs){cx.beginPath();cx.moveTo(0,gy);cx.lineTo(W,gy);cx.stroke();}
      cx.restore();
    }

    if(!isMobile){
      if(Math.random()<0.04) spawnStreak(`rgb(${ar},${ag},${ab})`);
      for(let i=STREAKS.length-1;i>=0;i--){
        const s=STREAKS[i];
        s.x+=s.vx*dt;s.life-=s.decay*dt;
        if(s.life<=0||s.x<-s.len){STREAKS.splice(i,1);continue;}
        cx.save();cx.globalAlpha=s.life*0.7;
        cx.shadowColor=s.col;cx.shadowBlur=6;
        const sg=cx.createLinearGradient(s.x,s.y,s.x+s.len,s.y);
        sg.addColorStop(0,'transparent');sg.addColorStop(0.3,s.col+'88');
        sg.addColorStop(0.7,s.col);sg.addColorStop(1,'transparent');
        cx.strokeStyle=sg;cx.lineWidth=s.w;
        cx.beginPath();cx.moveTo(s.x,s.y);
        cx.lineTo(s.x+Math.cos(s.ang)*s.len,s.y+Math.sin(s.ang)*s.len);
        cx.stroke();cx.restore();
      }
    }

    MOTES.forEach(m=>{
      m.x+=m.vx*dt;m.y+=m.vy*dt;m.life-=0.0002*dt;
      if(m.y<0||m.life<=0){m.x=Math.random();m.y=1+Math.random()*0.2;m.life=0.5+Math.random()*0.5;m.col=`rgb(${ar},${ag},${ab})`;}
      cx.save();cx.globalAlpha=m.a*m.life;
      cx.shadowColor=m.col;cx.shadowBlur=isMobile?4:8;
      cx.fillStyle=m.col;
      cx.beginPath();cx.arc(m.x*W,m.y*H,m.r,0,Math.PI*2);cx.fill();
      cx.restore();
    });

    if(scanPat){cx.fillStyle=scanPat;cx.fillRect(0,0,W,H);}

    const vig=cx.createRadialGradient(W/2,H/2,H*0.15,W/2,H/2,H*0.9);
    vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.7)');
    cx.fillStyle=vig;cx.fillRect(0,0,W,H);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
