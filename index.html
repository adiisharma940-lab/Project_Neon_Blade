<title>PROJECT NEON BLADE — by adiie.bat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&family=Noto+Serif+JP:wght@300;400&display=swap');
:root{--bg:#04050a;--text:#e0e8f0;--dim:#3a4455;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
#bgc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ── HERO ── */
#hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:2;}
.hero-title{font-family:'Orbitron',monospace;font-size:clamp(28px,5.5vw,80px);font-weight:900;letter-spacing:12px;text-align:center;line-height:1.1;background:linear-gradient(135deg,#ff00ff,#ff6ec7,#ff00aa,#ff4444,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(255,0,200,0.5));}
.hero-sub{font-family:'Orbitron',monospace;font-size:clamp(8px,1.1vw,12px);letter-spacing:6px;color:var(--dim);margin-top:16px;text-transform:uppercase;}
.hero-line{width:120px;height:1px;margin:22px auto;background:linear-gradient(90deg,transparent,#ff00cc,transparent);}
.scroll-hint{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:8px;letter-spacing:4px;color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:8px;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}

/* ── SWORD SECTION — DESKTOP ── */
.sword-section{min-height:220vh;display:flex;align-items:stretch;position:relative;z-index:2;overflow:hidden;}
.sword-stage{width:55%;min-height:220vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.scabbard-el{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  will-change:transform,opacity;
  pointer-events:none;
  width:min(400px,82%);height:auto;display:block;
  transform-origin:center center;
}
.sword-canvas-wrap{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  will-change:transform,filter;
  transform-origin:center center;
  width:min(400px,82%);height:auto;display:block;
}
.sword-info{width:45%;min-height:220vh;padding:clamp(30px,5vw,80px) clamp(14px,3.5vw,70px) clamp(30px,5vw,80px) clamp(10px,2vw,30px);display:flex;flex-direction:column;justify-content:center;background:linear-gradient(90deg,rgba(4,5,10,0) 0%,rgba(4,5,10,0.65) 18%,rgba(4,5,10,0.8) 55%,rgba(4,5,10,0.65) 100%);position:relative;z-index:3;}

/* ── MOBILE SWORD ANCHOR ── shared wrapper that gives rotated canvas room */
.mob-sword-anchor{display:none;}

/* ── STATS ── */
.sword-stats{margin:18px 0 10px;opacity:0;transform:translateX(14px);transition:opacity .7s ease .52s,transform .7s ease .52s;}
.sword-section.vis .sword-stats{opacity:1;transform:translateX(0);}
.stats-title{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:4px;color:var(--dim);margin-bottom:12px;}
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stat-label{font-family:'Orbitron',monospace;font-size:7px;letter-spacing:2px;color:var(--dim);width:72px;flex-shrink:0;text-transform:uppercase;}
.stat-bar-bg{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;position:relative;}
.stat-bar-fill{height:100%;border-radius:2px;transform:scaleX(0);transform-origin:left;transition:transform 1.1s cubic-bezier(.16,1,.3,1);transition-delay:var(--sd,0s);}
.sword-section.vis .stat-bar-fill{transform:scaleX(1);}
.stat-val{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;width:28px;text-align:right;flex-shrink:0;}

/* ── TEXT ANIMS ── */
.sword-num{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:5px;margin-bottom:10px;opacity:0;transform:translateX(28px);transition:opacity .6s ease .05s,transform .6s ease .05s;}
.sword-name{font-family:'Orbitron',monospace;font-size:clamp(20px,2.8vw,40px);font-weight:900;letter-spacing:3px;line-height:1.1;margin-bottom:6px;opacity:0;transform:translateX(32px);transition:opacity .7s ease .15s,transform .7s ease .15s;}
.sword-jp{font-family:'Noto Serif JP',serif;font-size:clamp(13px,1.5vw,20px);font-weight:300;margin-bottom:20px;opacity:0;transform:translateX(28px);transition:opacity .6s ease .22s,transform .6s ease .22s;}
.sword-divider{height:2px;width:48px;margin-bottom:20px;opacity:0;transform:scaleX(0);transform-origin:left;transition:opacity .5s ease .3s,transform .5s ease .3s;}
.sword-desc{font-size:clamp(13px,1.3vw,16px);line-height:1.9;color:rgba(224,232,240,0.68);font-weight:300;max-width:460px;margin-bottom:16px;opacity:0;transform:translateX(22px);transition:opacity .7s ease .38s,transform .7s ease .38s;}
.sword-lore{font-style:italic;font-size:clamp(11px,1vw,13px);line-height:1.85;padding-left:14px;border-left:2px solid;max-width:400px;margin-bottom:18px;opacity:0;transform:translateX(18px);transition:opacity .7s ease .48s,transform .7s ease .48s;}
.sword-tags{display:flex;gap:10px;flex-wrap:wrap;opacity:0;transform:translateX(14px);transition:opacity .6s ease .7s,transform .6s ease .7s;}
.sword-tag{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;padding:5px 12px;border:1px solid;border-radius:2px;background:rgba(255,255,255,0.03);}
.sword-section.vis .sword-num,.sword-section.vis .sword-name,.sword-section.vis .sword-jp,
.sword-section.vis .sword-desc,.sword-section.vis .sword-lore,.sword-section.vis .sword-tags{opacity:1;transform:translateX(0);}
.sword-section.vis .sword-divider{opacity:1;transform:scaleX(1);}

/* ══════════════════════════════════════════════════════
   MOBILE LAYOUT
   The sword canvas (400×80) needs 200px clearance from its
   center when rotated 90°. We give it a dedicated anchor
   block that is 420px tall with overflow:visible so rotation
   never clips. The canvases are positioned absolute inside it,
   centered at the anchor's midpoint.
   ══════════════════════════════════════════════════════ */
@media(max-width:680px){
  .sword-section{
    flex-direction:column;
    min-height:auto;
    position:relative;
    overflow:visible; /* allow sword to overlap text below */
  }

  /* Desktop stage: hide on mobile */
  .sword-stage{ display:none; }

  /* Mobile anchor: sits above the info panel, tall enough
     for the canvas at 90° (canvas width = 320px → need ~160px
     above + below center = 320px + some breathing = 360px) */
  .mob-sword-anchor{
    display:block;
    width:100%;
    height:360px;
    position:relative;
    overflow:visible;  /* CRITICAL — never clip rotating canvas */
    z-index:5;
    flex-shrink:0;
  }

  /* Canvases sit centered in the anchor */
  .mob-sword-anchor .scabbard-el,
  .mob-sword-anchor .sword-canvas-wrap{
    position:absolute;
    left:50%;
    top:50%;
    /* scale canvas to 88vw wide — at 88vw, rotated = 88vw tall,
       which fits inside 360px anchor on most phones (360/vw ≈ 88) */
    width:min(320px,88vw);
    height:auto;
    transform-origin:center center;
  }

  /* Text panel: no top padding needed since anchor provides space */
  .sword-info{
    width:100%;
    min-height:auto;
    padding:24px 22px 50px;
    background:linear-gradient(
      to bottom,
      rgba(4,5,10,0.6) 0%,
      rgba(4,5,10,0.88) 20%,
      rgba(4,5,10,0.80) 100%
    );
    position:relative;
    z-index:3;
  }

  .sword-name{font-size:clamp(22px,6vw,34px);}
  .sword-jp{font-size:clamp(14px,4vw,20px);}
  .sword-desc{font-size:14px;max-width:100%;}
  .sword-lore{font-size:12px;max-width:100%;}
  .stat-label{width:60px;}
}

.sep{height:1px;z-index:2;position:relative;background:linear-gradient(90deg,transparent,rgba(255,0,200,0.12) 30%,rgba(255,0,200,0.25) 50%,rgba(255,0,200,0.12) 70%,transparent);}
footer{text-align:center;padding:60px 20px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:4px;color:var(--dim);position:relative;z-index:2;}
</style>

function genStats(rng){
  const base=()=>Math.round(30+rng()*65);
  const high=()=>Math.round(70+rng()*30);
  const low=()=>Math.round(5+rng()*40);
  const v=[base(),base(),base(),base(),base()];
  v[Math.floor(rng()*5)]=high();
  v[Math.floor(rng()*5)]=low();
  return v.map(n=>Math.min(99,Math.max(5,n)));
}

function genSword(idx){
  const rng=mulberry32(idx*1234567+98765);

  const jp=pick(JP_PRE,rng)+pick(JP_SUF,rng);
  const myth=pick(MYTHOLOGIES,rng);
  const col=pick(COLORS,rng);
  const style=pick(STYLES,rng);
  const grip=pick(GRIPS,rng);
  const guard=pick(GUARDS,rng);
  const v={t:pick(['three','seven','nine','twelve','forty','a hundred','a thousand'],rng),t2:pick(['two','four','six','eight','ten'],rng),pl:pick(PLACES,rng),be:pick(BEINGS,rng),he:pick(HEROES,rng),f1:pick(FORCES,rng),f2:pick(FORCES,rng),mat:pick(MATERIALS,rng),cu:pick(CULTURES,rng),do:pick(DOMAINS,rng),adj:pick(ADJS,rng),adj2:pick(ADJS,rng)};
  const desc=pick(DESCS,rng)(v);

  const stats=genStats(rng);
  return{id:`s${idx}`,name,jp,myth,c1:col[0],c2:col[1],c3:col[2],desc,lore,tags,stats,bladeStyle:style,gripColor:grip,guardColor:guard};
}

function lighten(hex,a){try{const n=parseInt(hex.replace(/[^0-9a-f]/gi,'').slice(0,6),16);return`#${[n>>16,n>>8&255,n&255].map(v=>Math.min(255,v+a).toString(16).padStart(2,'0')).join('')}`;}catch{return hex;}}
function darken(hex,a){try{const n=parseInt(hex.replace(/[^0-9a-f]/gi,'').slice(0,6),16);return`#${[n>>16,n>>8&255,n&255].map(v=>Math.max(0,v-a).toString(16).padStart(2,'0')).join('')}`;}catch{return hex;}}

// ══════════════════════════════════════════════════════
function buildStatsHTML(sw){
  const rows=STAT_NAMES.map((name,i)=>{
    const val=sw.stats[i];
    const delay=(0.6+i*0.08).toFixed(2)+'s';
    return `<div class="stat-row">
      <span class="stat-label">${name}</span>
      <div class="stat-bar-bg">
        <div class="stat-bar-fill" style="width:${val}%;background:linear-gradient(90deg,${sw.c1}88,${sw.c1});box-shadow:0 0 8px ${sw.c1}66;--sd:${delay}"></div>
      </div>
      <span class="stat-val" style="color:${sw.c1}">${val}</span>
    </div>`;
  }).join('');
  return `<div class="sword-stats">
    <div class="stats-title">ATTRIBUTES</div>
    ${rows}
  </div>`;
}

// ══════════════════════════════════════════════════════
// DETECT MOBILE
// ══════════════════════════════════════════════════════
const IS_MOB = window.innerWidth <= 680;

// ══════════════════════════════════════════════════════
// SECTION CREATION
// ══════════════════════════════════════════════════════
const root=document.getElementById('root');
// Desktop sections are ~2.2vh tall; mobile are shorter since layout stacks
const PH = IS_MOB ? Math.round(window.innerHeight*1.4) : Math.round(window.innerHeight*2.2);

const liveSections=new Map();

function createSection(idx){
  if(liveSections.has(idx)) return;
  const sw=SWORDS[idx];
  const ph=document.getElementById(`ph_${idx}`);
  if(!ph||!ph.parentNode) return;

  const sec=document.createElement('section');
  sec.className='sword-section';
  sec.id=`sec_${idx}`;
  sec.style.minHeight=PH+'px';

  const sc=drawSwordCanvas(sw);
  sc.className='sword-canvas-wrap';
  const sb=drawScabbardCanvas(sw);
  sb.className='scabbard-el';

  if(IS_MOB){
    // Mobile: dedicated anchor block above the text panel
    const anchor=document.createElement('div');
    anchor.className='mob-sword-anchor';
    anchor.appendChild(sb);
    anchor.appendChild(sc);
    sec.appendChild(anchor);
  } else {
    // Desktop: original stage layout
    const stage=document.createElement('div');
    stage.className='sword-stage';
    stage.style.minHeight=PH+'px';
    stage.appendChild(sb);
    stage.appendChild(sc);
    sec.appendChild(stage);
  }

  // Info panel
  const info=document.createElement('div');
  info.className='sword-info';
  if(!IS_MOB) info.style.minHeight=PH+'px';
  info.innerHTML=`
    <div class="sword-num" style="color:${sw.c1}">${String(idx+1).padStart(4,'0')} / 1000 · ${sw.myth}</div>
    <div class="sword-name" style="color:${sw.c1};text-shadow:0 0 30px ${sw.c1}88,0 0 60px ${sw.c1}44">${sw.name}</div>
    <div class="sword-jp" style="color:${sw.c1}88">${sw.jp}</div>
    <div class="sword-divider" style="background:linear-gradient(90deg,${sw.c1},${sw.c2},transparent)"></div>
    <p class="sword-desc">${sw.desc}</p>
    <p class="sword-lore" style="border-color:${sw.c1}44;color:${sw.c1}77">${sw.lore}</p>
    ${buildStatsHTML(sw)}
    <div class="sword-tags">${sw.tags.map(t=>`<span class="sword-tag" style="border-color:${sw.c1}44;color:${sw.c1}">${t}</span>`).join('')}</div>
  `;
  sec.appendChild(info);

  ph.replaceWith(sec);

  const meta={sec,swordEl:sc,scabbardEl:sb,sw,lastP:-1};
  liveSections.set(idx,meta);

  visObs.observe(sec);
  applyTransform(meta,0);
}

// ══════════════════════════════════════════════════════
// SCROLL ANIMATION
// ══════════════════════════════════════════════════════
function eio(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
function eout(t){return 1-(1-t)*(1-t);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function lerp(a,b,t){return a+(b-a)*t;}

function applyTransform(d,p){
  const{swordEl,scabbardEl,sw}=d;

  if(IS_MOB){
    // ── MOBILE ANIMATION ──
    // Canvas is 400×80 (scaled to ~88vw × ~17vw on phone).
    // Centered in a 360px-tall anchor via CSS. overflow:visible on anchor
    // means rotation NEVER clips — the canvas just rotates in space.
    //
    // Sequence (p = 0→1 across section scroll):
    //  0.00–0.08  fade in, horizontal
    //  0.08–0.45  rotate 0° → 90° (tip pointing DOWN)
    //  0.40–0.62  scabbard drops away downward
    //  0.45–0.68  sword holds vertical, glow peaks
    //  0.68–0.85  sword drifts RIGHT (+TX) and fades out
    //  0.85+      both gone

    let rot=0, swordOp=0, swordTX=0, swordTY=0;
    let scabOp=0, scabTY=0;

    if(p < 0.04){
      swordOp=0; scabOp=0; rot=0;
    }
    else if(p < 0.10){
      // Fade in horizontal
      const t=eio((p-0.04)/0.06);
      swordOp=t; scabOp=t; rot=0;
    }
    else if(p < 0.46){
      // Rotate horizontal → vertical (tip down = 90°)
      swordOp=1; scabOp=1;
      rot=lerp(0, 90, eio((p-0.10)/0.36));
      // Scabbard starts dropping partway through rotation
      if(p < 0.34){
        scabOp=1; scabTY=0;
      } else {
        const t2=eio((p-0.34)/0.12);
        scabOp=lerp(1,0,t2);
        scabTY=lerp(0,220,t2);
      }
    }
    else if(p < 0.68){
      // Sword fully vertical, hold, glow
      swordOp=1; rot=90; swordTX=0; swordTY=0;
      scabOp=0; scabTY=220;
    }
    else if(p < 0.86){
      // Drift RIGHT and fade
      const t=eio((p-0.68)/0.18);
      swordOp=lerp(1,0,t);
      rot=90;
      // vw-based right drift: roughly half the screen width
      swordTX=lerp(0, window.innerWidth*0.55, t);
      swordTY=0;
      scabOp=0;
    }
    else{
      swordOp=0; rot=90; scabOp=0;
    }

    // Glow peaks at vertical hold phase
    let g=0;
    if(p>=0.42 && p<0.54) g=lerp(0,1,eio((p-0.42)/0.12));
    else if(p>=0.54 && p<0.66) g=1;
    else if(p>=0.66 && p<0.78) g=lerp(1,0,eio((p-0.66)/0.12));
    const g1=Math.round(8+g*28), g2=Math.round(12+g*38), g3=Math.round(g*20);
    const gh=Math.round(g*200).toString(16).padStart(2,'0');
    const gk=Math.round(g*130).toString(16).padStart(2,'0');
    const fs=g>0.03
      ?`drop-shadow(0 0 ${g1}px ${sw.c1}) drop-shadow(0 0 ${g2}px ${sw.c1}${gh}) drop-shadow(0 0 ${g3}px ${sw.c2}${gk})`
      :'none';

    // CSS already places canvas at left:50%;top:50%;translate(-50%,-50%)
    // Our transform REPLACES that, so we must keep the centering:
    swordEl.style.transform=`translate(calc(-50% + ${swordTX}px), calc(-50% + ${swordTY}px)) rotate(${rot}deg)`;
    swordEl.style.opacity=swordOp;
    swordEl.style.filter=fs;
    scabbardEl.style.transform=`translate(-50%, calc(-50% + ${scabTY}px)) rotate(0deg)`;
    scabbardEl.style.opacity=scabOp;
    return;
  }

  // ── DESKTOP (original animation) ──
  let rot=0,swordOp=0,swordTY=0;
  if(p<0.06){swordOp=0;rot=0;}
  else if(p<0.12){swordOp=lerp(0,1,eio((p-0.06)/0.06));rot=0;}
  else if(p<0.60){swordOp=1;rot=lerp(0,90,eio((p-0.12)/0.48));}
  else if(p<0.78){swordOp=1;rot=90;}
  else if(p<0.92){const t=(p-0.78)/0.14;swordOp=lerp(1,0,eout(t));rot=90;swordTY=lerp(0,-30,eout(t));}
  else{swordOp=0;rot=90;}

  let scabOp=0,scabTY=0;
  if(p<0.06){scabOp=0;scabTY=0;}
  else if(p<0.12){scabOp=lerp(0,1,eio((p-0.06)/0.06));scabTY=0;}
  else if(p<0.38){scabOp=1;scabTY=0;}
  else if(p<0.72){const t=eio((p-0.38)/0.34);scabOp=lerp(1,0,t);scabTY=lerp(0,340,t);}
  else{scabOp=0;scabTY=340;}

  let g=0;
  if(p>=0.50&&p<0.62) g=lerp(0,1,eio((p-0.50)/0.12));
  else if(p>=0.62&&p<0.76) g=1;
  else if(p>=0.76&&p<0.88) g=lerp(1,0,eio((p-0.76)/0.12));
  const g1=Math.round(8+g*30),g2=Math.round(12+g*40),g3=Math.round(g*22);
  const gh=Math.round(g*200).toString(16).padStart(2,'0');
  const gk=Math.round(g*140).toString(16).padStart(2,'0');
  const fs=g>0.03?`drop-shadow(0 0 ${g1}px ${sw.c1}) drop-shadow(0 0 ${g2}px ${sw.c1}${gh}) drop-shadow(0 0 ${g3}px ${sw.c2}${gk})`:'none';

  swordEl.style.transform=`translate(-50%, calc(-50% + ${swordTY}px)) rotate(${rot}deg)`;
  swordEl.style.opacity=swordOp;
  swordEl.style.filter=fs;
  scabbardEl.style.transform=`translate(-50%, calc(-50% + ${scabTY}px)) rotate(0deg)`;
  scabbardEl.style.opacity=scabOp;
}

// Visibility observer
const visObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{e.target.classList.toggle('vis',e.isIntersecting);});
},{threshold:0.08});

// ══════════════════════════════════════════════════════
// LAZY LOAD
// ══════════════════════════════════════════════════════
const frag=document.createDocumentFragment();
for(let i=0;i<TOTAL;i++){
  const ph=document.createElement('div');
  ph.id=`ph_${i}`;
  ph.style.cssText=`min-height:${PH}px;position:relative;z-index:2;`;
  frag.appendChild(ph);
  if(i<TOTAL-1){const sep=document.createElement('div');sep.className='sep';frag.appendChild(sep);}
}
root.appendChild(frag);

for(let i=0;i<8;i++) createSection(i);

let lastScrollY=-1;
function lazyRender(){
  const sy=window.scrollY;
  if(Math.abs(sy-lastScrollY)<50) return;
  lastScrollY=sy;
  const vh=window.innerHeight;
  const sectionH=PH+1;
  const heroH=document.getElementById('hero').offsetHeight||vh;
  const relY=sy-heroH;
  const firstIdx=Math.max(0,Math.floor((relY-vh*1.5)/sectionH));
  const lastIdx=Math.min(TOTAL-1,Math.ceil((relY+vh*2.5)/sectionH));
  for(let i=firstIdx;i<=lastIdx;i++) createSection(i);
}

// ══════════════════════════════════════════════════════
// MAIN SCROLL HANDLER
// ══════════════════════════════════════════════════════
function onScroll(){
  lazyRender();
  const vh=window.innerHeight;
  liveSections.forEach((d)=>{
    const r=d.sec.getBoundingClientRect();
    if(r.bottom<-vh*0.5||r.top>vh*2) return;
    const h=d.sec.offsetHeight;
    const p=clamp((vh-r.top)/(h+vh),0,1);
    if(Math.abs(p-d.lastP)>0.0004){
      d.lastP=p;
      applyTransform(d,p);
    }
  });
}

window.addEventListener('scroll',onScroll,{passive:true});
window.addEventListener('resize',()=>{setTimeout(onScroll,80);},{passive:true});
setTimeout(()=>{lazyRender();onScroll();},50);

// ══════════════════════════════════════════════════════
// BACKGROUND
// ══════════════════════════════════════════════════════
(function(){
  const cv=document.getElementById('bgc'),cx=cv.getContext('2d');
  let W,H;
  const isMob=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)||window.innerWidth<680;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();

  const STARS=[];
  for(let i=0;i<(isMob?80:280);i++) STARS.push({x:Math.random(),y:Math.random(),r:Math.random()*(isMob?1:1.4)+0.2,a:Math.random()*0.7+0.1,tw:Math.random()*Math.PI*2,ts:0.008+Math.random()*0.015});
  const STREAKS=[];
  function spawnS(col){if(isMob)return;STREAKS.push({x:Math.random()*W,y:Math.random()*H,len:60+Math.random()*200,ang:Math.PI*(-0.05+Math.random()*0.1),vx:-0.3-Math.random()*0.6,life:1,decay:0.004+Math.random()*0.006,col,w:0.5+Math.random()*1.2});}
  const MOTES=[];
  for(let i=0;i<(isMob?15:50);i++) MOTES.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*0.0001,vy:-(0.00005+Math.random()*0.0001),r:.8+Math.random()*2,a:.15+Math.random()*.35,life:Math.random(),col:'#ff00cc'});

  const NW=isMob?640:1920,NH=isMob?360:1080,nOc=document.createElement('canvas');
  nOc.width=NW;nOc.height=NH;const noc=nOc.getContext('2d');
  [{x:.15,y:.3,r:isMob?130:400,c:'rgba(120,0,180,.025)'},{x:.85,y:.7,r:isMob?110:350,c:'rgba(0,150,255,.02)'},{x:.5,y:.5,r:isMob?160:500,c:'rgba(180,0,120,.018)'},{x:.3,y:.8,r:isMob?100:300,c:'rgba(0,200,150,.015)'},{x:.7,y:.2,r:isMob?120:380,c:'rgba(255,100,0,.015)'}].forEach(n=>{const g=noc.createRadialGradient(n.x*NW,n.y*NH,0,n.x*NW,n.y*NH,n.r);g.addColorStop(0,n.c);g.addColorStop(1,'transparent');noc.fillStyle=g;noc.fillRect(0,0,NW,NH);});

  let aR=255,aG=0,aB=200,tR=255,tG=0,tB=200;
  function updateAccent(){
    const cy=window.scrollY+window.innerHeight/2;
    const heroH=document.getElementById('hero').offsetHeight||window.innerHeight;
    const sH=PH+1;
    const idx=Math.round((cy-heroH)/sH);
    const sw=SWORDS[Math.max(0,Math.min(TOTAL-1,idx))];
    const h=sw.c1.replace('#','').slice(0,6);
    tR=parseInt(h.slice(0,2),16)||0;tG=parseInt(h.slice(2,4),16)||0;tB=parseInt(h.slice(4,6),16)||0;
  }
  window.addEventListener('scroll',updateAccent,{passive:true});

  let scanPat=null;
  if(!isMob){const s=document.createElement('canvas');s.width=4;s.height=4;const sc=s.getContext('2d');sc.fillStyle='rgba(0,0,0,.06)';sc.fillRect(0,0,4,2);scanPat=cx.createPattern(s,'repeat');}

  let lastT=0;
  function frame(ts){
    const dt=Math.min(ts-lastT,50);lastT=ts;
    aR+=(tR-aR)*.008;aG+=(tG-aG)*.008;aB+=(tB-aB)*.008;
    const ar=Math.round(aR),ag=Math.round(aG),ab=Math.round(aB);
    cx.clearRect(0,0,W,H);
    const bg=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.8);
    bg.addColorStop(0,`rgba(${Math.round(ar*.04)},${Math.round(ag*.04)},${Math.round(ab*.06+8)},1)`);
    bg.addColorStop(.5,`rgba(${Math.round(ar*.02)},${Math.round(ag*.02)},${Math.round(ab*.04+5)},1)`);
    bg.addColorStop(1,'rgba(2,3,6,1)');
    cx.fillStyle=bg;cx.fillRect(0,0,W,H);
    cx.save();cx.globalAlpha=.8;cx.drawImage(nOc,0,0,W,H);cx.restore();
    STARS.forEach(s=>{s.tw+=s.ts*dt;const a=s.a*(.6+.4*Math.sin(s.tw));cx.fillStyle=`rgba(${180+Math.round(ar*.3)},${180+Math.round(ag*.2)},${200+Math.round(ab*.2)},${a})`;cx.beginPath();cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);cx.fill();});
    if(!isMob){
      if(Math.random()<.04)spawnS(`rgb(${ar},${ag},${ab})`);
      for(let i=STREAKS.length-1;i>=0;i--){const s=STREAKS[i];s.x+=s.vx*dt;s.life-=s.decay*dt;if(s.life<=0||s.x<-s.len){STREAKS.splice(i,1);continue;}cx.save();cx.globalAlpha=s.life*.7;cx.shadowColor=s.col;cx.shadowBlur=6;const sg=cx.createLinearGradient(s.x,s.y,s.x+s.len,s.y);sg.addColorStop(0,'transparent');sg.addColorStop(.3,s.col+'88');sg.addColorStop(.7,s.col);sg.addColorStop(1,'transparent');cx.strokeStyle=sg;cx.lineWidth=s.w;cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(s.x+Math.cos(s.ang)*s.len,s.y+Math.sin(s.ang)*s.len);cx.stroke();cx.restore();}
    }
    MOTES.forEach(m=>{m.x+=m.vx*dt;m.y+=m.vy*dt;m.life-=.0002*dt;if(m.y<0||m.life<=0){m.x=Math.random();m.y=1+Math.random()*.2;m.life=.5+Math.random()*.5;m.col=`rgb(${ar},${ag},${ab})`;}cx.save();cx.globalAlpha=m.a*m.life;cx.shadowColor=m.col;cx.shadowBlur=isMob?4:8;cx.fillStyle=m.col;cx.beginPath();cx.arc(m.x*W,m.y*H,m.r,0,Math.PI*2);cx.fill();cx.restore();});
    if(scanPat){cx.fillStyle=scanPat;cx.fillRect(0,0,W,H);}
    const vig=cx.createRadialGradient(W/2,H/2,H*.15,W/2,H/2,H*.9);
    vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.7)');
    cx.fillStyle=vig;cx.fillRect(0,0,W,H);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
